<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализация потока минимальной стоимости</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Поток минимальной стоимости: визуализатор</h1>
    </header>
    <main>
        <section id="canvas-container">
            <canvas id="graph-canvas" width="800" height="600"></canvas>
        </section>
        <aside id="controls">
            <h3>Управление</h3>
            <div style="margin-bottom: 12px; font-size: 13px; color: #666;">
                • Клик по полю: добавить вершину<br>
                • Клик по вершине ×2: создать ребро
            </div>
            <button id="btn-start">▶ Запустить алгоритм</button>
            <button id="btn-prev">◀ Prev</button>
            <button id="btn-next">Next ▶</button>
            <button id="btn-delete-mode">Режим удаления</button>
            <div id="step-info">Ожидание запуска...</div>
        </aside>
    </main>
    <script src="app.js"></script>
</body>
</html>
